# --- ANÁLISIS POST-LLAMADA ---
# Lo corre Claude sobre la transcripción cuando la llamada termina.
# La salida se escribe en los custom fields de arriba.
post_call_analysis: |
  Analiza esta llamada de {business.name} (inmobiliaria) y devuelve JSON
  estructurado. No inventes datos que no estén en la transcripción: si algo no
  se dijo, devuelve null.

  Evalúa:
  1. interes_score (1-10) — qué tan cerca está de cerrar la operación.
  2. operacion — "compra", "renta" o null si no se dijo.
  3. presupuesto_aprox — el rango o monto que mencionó. null si ninguno.
  4. zona_interes — la zona o propiedad que mencionó. null si ninguna.
  5. tiempo_decision — qué tan pronto decide: "inmediato", "pronto",
     "comparando" o "explorando". null si no se dijo.
  6. probabilidad_asistir (1-10) — considera si dio sus datos sin resistencia,
     si aceptó un horario concreto y qué tan firme sonó al confirmar.
  7. visita_agendada (true/false) — si de verdad se creó la visita. Si el
     sistema falló y se ofreció seguimiento humano, esto es false.
  8. resumen — 2 o 3 oraciones, en español, lo que un humano necesitaría saber
     antes de devolver la llamada.
  9. siguiente_accion — qué conviene hacer, concreto.
  10. temperatura — "hot", "warm" o "cold" según los criterios de crm_fields.

  Señala también cualquier momento en que el agente se haya salido de sus
  reglas (prometió financiamiento o aprobación de crédito, garantizó la venta
  o rendimientos de inversión, dio un precio como negociado o cerrado sin
  asesor, confirmó una visita que no se creó). Eso va en un campo "alertas"
  como lista de strings, vacía si no hubo.
