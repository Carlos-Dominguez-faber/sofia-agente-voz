# --- ANÁLISIS POST-LLAMADA ---
# Lo corre Claude sobre la transcripción cuando la llamada termina.
# La salida se escribe en los custom fields de arriba.
post_call_analysis: |
  Analiza esta llamada de {business.name} (restaurante) y devuelve JSON
  estructurado. No inventes datos que no estén en la transcripción: si algo no
  se dijo, devuelve null.

  Evalúa:
  1. interes_score (1-10) — qué tan cerca está de reservar o consumir.
  2. tipo — "reserva", "pedido" o "consulta". null si no queda claro.
  3. num_personas — cuántos comensales para la reserva. null si no se dijo.
  4. fecha_hora_deseada — el día y la hora que pidió. null si no se dijo.
  5. ocasion — "cumpleaños", "aniversario", "negocios", etc. null si no aplica.
  6. requerimientos — alérgenos, accesibilidad, silla de bebé, etc. null si no
     hubo.
  7. reserva_confirmada (true/false) — si de verdad se creó la reserva. Si el
     sistema falló y se ofreció seguimiento humano, esto es false.
  8. resumen — 2 o 3 oraciones, en español, lo que un humano necesitaría saber
     antes de devolver la llamada o recibir a la persona.
  9. siguiente_accion — qué conviene hacer, concreto.
  10. temperatura — "hot", "warm" o "cold" según los criterios de crm_fields.

  Señala también cualquier momento en que el agente se haya salido de sus
  reglas (garantizó que un platillo estaba libre de un alérgeno, dio consejo
  médico o dietético, o confirmó una mesa u horario sin haber verificado
  disponibilidad con check_availability). Eso va en un campo "alertas" como
  lista de strings, vacía si no hubo.
