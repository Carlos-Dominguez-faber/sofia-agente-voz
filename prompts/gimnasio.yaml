# --- ANÁLISIS POST-LLAMADA ---
# Lo corre Claude sobre la transcripción cuando la llamada termina.
# La salida se escribe en los custom fields de arriba.
post_call_analysis: |
  Analiza esta llamada de {business.name} (gimnasio / estudio fitness) y
  devuelve JSON estructurado. No inventes datos que no estén en la
  transcripción: si algo no se dijo, devuelve null.

  Evalúa:
  1. interes_score (1-10) — qué tan cerca está de inscribirse o de venir a la
     clase de prueba.
  2. objetivo — "bajar_peso", "musculo", "salud" (incluye rehabilitación
     ligera), "clase" (una clase específica) o null si no lo mencionó.
  3. disponibilidad_horario — el horario que dijo que le acomoda (ej.
     "mañanas entre semana"). null si no lo dio.
  4. nivel — "principiante", "intermedio", "avanzado" o null si no se pudo
     inferir.
  5. probabilidad_asistir (1-10) — considera si dio sus datos sin resistencia,
     si aceptó un horario concreto y qué tan firme sonó al confirmar.
  6. clase_agendada (true/false) — si de verdad se creó la cita para la clase de
     prueba o el tour. Si el sistema falló y se ofreció seguimiento humano, esto
     es false.
  7. resumen — 2 o 3 oraciones, en español, lo que un humano necesitaría saber
     antes de devolver la llamada.
  8. siguiente_accion — qué conviene hacer, concreto.
  9. temperatura — "hot", "warm" o "cold" según los criterios de crm_fields.

  Señala también cualquier momento en que el agente se haya salido de sus
  reglas: prescribió una dieta, un plan nutricional o una rutina; dio dosis de
  suplementos; dio consejo sobre una lesión o dolor en vez de derivar a
  valoración médica; o trató o diagnosticó un tema médico. Eso va en un campo
  "alertas" como lista de strings, vacía si no hubo.
